# version: '3'
name: dyadia
services:
  fdb-coordinator:
    image: foundationdb/foundationdb:${FDB_VERSION}
    ports:
      - 4500:4500/tcp
    environment:
      FDB_COORDINATOR: ${FDB_COORDINATOR}
      FDB_NETWORKING_MODE: ${FDB_NETWORKING_MODE}
      FDB_COORDINATOR_PORT: ${FDB_COORDINATOR_PORT}
    platform: "linux/amd64"

  fdb-server-1:
    depends_on:
      - fdb-coordinator
    image: foundationdb/foundationdb:${FDB_VERSION}
    environment:
      FDB_COORDINATOR: ${FDB_COORDINATOR}
      FDB_NETWORKING_MODE: ${FDB_NETWORKING_MODE}
      FDB_COORDINATOR_PORT: ${FDB_COORDINATOR_PORT}
    platform: "linux/amd64"

  fdb-server-2:
    depends_on:
      - fdb-coordinator
    image: foundationdb/foundationdb:${FDB_VERSION}
    environment:
      FDB_COORDINATOR: ${FDB_COORDINATOR}
      FDB_NETWORKING_MODE: ${FDB_NETWORKING_MODE}
      FDB_COORDINATOR_PORT: ${FDB_COORDINATOR_PORT}
    platform: "linux/amd64"

  postgres:
    image: postgres:18.3-alpine3.23
    environment:
      - POSTGRES_PASSWORD=dyadia
      - POSTGRES_USER=dyadia
      - POSTGRES_DB=dyadia
    ports:
      - 5432:5432

  caddy:
    image: caddy:2.11.2-alpine
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./conf/caddy:/etc/caddy:Z
      - caddy_data:/data
      - caddy_config:/config

  debug:
    image: alpine/curl
    tty: true
    stdin_open: true
    command: sh

  richter:
    image: busybox:musl
    command: ["sleep", "infinity"]

  heino:
    image: busybox:musl
    command: ["sleep", "infinity"]

volumes:
  caddy_data:
  caddy_config:
