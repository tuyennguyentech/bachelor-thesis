<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- HOST layer -->
  <rect x="20" y="20" width="640" height="100" rx="16" stroke-width="0.5" fill="#F1EFE8" stroke="#5F5E5A"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" x="44" y="44">Host</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="44" y="62">Filesystem, Go toolchain, HOME, VSCode — unchanged</text>

  <rect x="44" y="76" width="180" height="32" rx="6" stroke-width="0.5" fill="#D3D1C7" stroke="#888780"/>
  <text font-family="sans-serif" font-size="12" font-weight="500" fill="#2C2C2A" x="134" y="96" text-anchor="middle">Validate container</text>

  <rect x="240" y="76" width="180" height="32" rx="6" stroke-width="0.5" fill="#D3D1C7" stroke="#888780"/>
  <text font-family="sans-serif" font-size="12" font-weight="500" fill="#2C2C2A" x="330" y="96" text-anchor="middle">Detect DNS gateway</text>

  <rect x="436" y="76" width="210" height="32" rx="6" stroke-width="0.5" fill="#D3D1C7" stroke="#888780"/>
  <text font-family="sans-serif" font-size="12" font-weight="500" fill="#2C2C2A" x="541" y="96" text-anchor="middle">Parse CMD (default: sh)</text>

  <!-- Arrow host to Layer 1 -->
  <line x1="340" y1="120" x2="340" y2="148" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="11" font-weight="500" fill="#5F5E5A" x="350" y="140">podman unshare --rootless-netns</text>

  <!-- LAYER 1 — rootless netns -->
  <rect x="20" y="150" width="640" height="54" rx="16" stroke-width="0.5" fill="#E1F5EE" stroke="#0F6E56"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#085041" x="44" y="176">Layer 1 : podman unshare --rootless-netns</text>
  <text font-family="sans-serif" font-size="12" fill="#0F6E56" x="380" y="176">Container network reachable (one-way)</text>

  <!-- Arrow to Layer 2 -->
  <line x1="340" y1="204" x2="340" y2="232" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="11" font-weight="500" fill="#534AB7" x="350" y="224">unshare --mount</text>

  <!-- LAYER 2 — mount ns -->
  <rect x="20" y="234" width="640" height="306" rx="16" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#26215C" x="44" y="260">Layer 2 : unshare --mount</text>
  <text font-family="sans-serif" font-size="12" fill="#534AB7" x="270" y="260">Private mount namespace — safe resolv.conf override</text>

  <!-- resolv.conf box -->
  <rect x="44" y="278" width="592" height="48" rx="8" stroke-width="0.5" fill="#FAEEDA" stroke="#BA7517"/>
  <text font-family="sans-serif" font-size="12" font-weight="500" fill="#412402" x="340" y="298" text-anchor="middle">echo "nameserver $DNS" &gt; /tmp/resolv.conf</text>
  <text font-family="sans-serif" font-size="11" fill="#854F0B" x="340" y="316" text-anchor="middle">mount --bind /tmp/resolv.conf /etc/resolv.conf</text>

  <!-- Arrow resolv to exec -->
  <line x1="340" y1="326" x2="340" y2="350" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- exec CMD box -->
  <rect x="44" y="352" width="592" height="48" rx="8" stroke-width="0.5" fill="#FAECE7" stroke="#993C1D"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#4A1B0C" x="340" y="374" text-anchor="middle">exec "$@" — your command runs here</text>
  <text font-family="sans-serif" font-size="11" fill="#993C1D" x="340" y="394" text-anchor="middle">Host tools + compose DNS (one-way only)</text>

  <!-- Limitation note -->
  <rect x="44" y="420" width="592" height="100" rx="8" stroke-width="0.5" fill="#FFF3F0" stroke="#993C1D" stroke-dasharray="4,3"/>
  <text font-family="sans-serif" font-size="12" font-weight="600" fill="#993C1D" x="340" y="444" text-anchor="middle">Limitation: one-way connectivity</text>
  <text font-family="sans-serif" font-size="11" fill="#993C1D" x="340" y="464" text-anchor="middle">Process can reach containers (DNS works)</text>
  <text font-family="sans-serif" font-size="11" fill="#993C1D" x="340" y="484" text-anchor="middle">Containers CANNOT reach this process (no IP on bridge)</text>
  <text font-family="sans-serif" font-size="11" fill="#534AB7" x="340" y="508" text-anchor="middle">For bidirectional: use container-shell.sh (nsenter into container netns)</text>
</svg>
